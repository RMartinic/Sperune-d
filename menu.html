<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="menu.css">
    <script src="https://kit.fontawesome.com/1ca0ae003b.js" crossorigin="anonymous"></script>
    <script src="./menu.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<body>
    <header> 
        <h1>Šperun eat and drink</h1>
        <button onclick="location.href='index.html'"><i class="fa-solid fa-house"></i>Home</button>
        <button onclick="location.href='menu.html'"><i class="fa-solid fa-list"></i>Menu</button>
        <button><i class="fa-solid fa-images"></i>Gallery</button>
        <label for="lang"><i class="fa-solid fa-language"></i>Language</label>
        <select name="lang" id="langselect" onchange="chglang(Array)">
            <option value="eng">English</option>
            <option value="fra">Français</option>
            <option value="ita">Italiano</option>
            <option value="deu">Deutsch</option>
            <option value="spa">Español</option>
            <option value="por">Português</option>
            <option value="cha">中国人</option>
            <option value="jap">日本語</option>
        </select>
        <hr />
    </header>
    <main>
        <div class="food-menu">
            <h3>Food</h3><hr/>
            <div class ="cold-appetizers">
                <div class="cold-appetizers-toggle"><h2>Cold appetizers</h2></div>
            </div>
            <hr/>
            <div class ="warm-appetizers">
                <div class="warm-appetizers-toggle"><h2>Warm appetizers</h2></div>
            </div>
            <hr/>
            <div class ="salads">
                <div class="salads-toggle"><h2>Salads</h2></div>
            </div>
            <hr/>
            <div class ="pasta">
                <div class="pasta-toggle"><h2>Pasta</h2></div>
            </div>
            <hr/>
            <div class ="risottos">
                <div class="risottos-toggle"><h2>Risottos</h2></div>
            </div>
            <hr/>
            <div class ="fish-meals">
                <div class="fish-meals-toggle"><h2>Fish meals</h2></div>
            </div>
            <hr/>
            <div class ="meat-meals">
                <div class="meat-meals-toggle"><h2>Meat meals</h2></div>
            </div>
            <hr/>
            <div class ="desserts">
                <div class="desserts-toggle"><h2>Desserts</h2></div>
            </div>
            <hr/>
            <div class ="side-dishes">
                <div class="side-dishes-toggle"><h2>Side dishes</h2></div>
            </div>
            <hr/>
        </div>
        <div class="drinks-menu">
            <h3>Drinks</h3><hr/>
            <div class ="hot-bevereges">
                <div class="hot-bevereges-toggle"><h2>Hot bevereges</h2></div>
            </div>
            <hr/>
            <div class ="nonalcholic-drinks">
                <div class="nonalcholic-drinks-toggle"><h2>Non-alcholic drinks</h2></div>
            </div>
            <hr/>
            <div class ="beers">
                <div class="beers-toggle"><h2>Beers</h2></div>
            </div>
            <hr/>
            <div class ="winelist">
                <div class="winelist-toggle"><h2>Wine list</h2></div>
            </div>
            <hr/>
            <div class ="hard-drinks">
                <div class="hard-drinks"><h2>Hard drinks</h2></div>
            </div>
            <hr/>
            <div class ="cocktails">
                <div class="cocktails-toggle"><h2>Cocktails</h2></div>
            </div>
            <hr/>
        </div>
    </main>
</body>
</html>
